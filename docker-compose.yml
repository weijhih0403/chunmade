services:
  postgres:
    image: postgres:16-alpine
    container_name: chun-erp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-chun}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-chun_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-chun_erp}
      TZ: Asia/Taipei
      PGTZ: Asia/Taipei
    ports:
      - "5432:5432"
    volumes:
      - chun_erp_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-chun} -d ${POSTGRES_DB:-chun_erp}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  chun_erp_pgdata:
    name: chun_erp_pgdata
